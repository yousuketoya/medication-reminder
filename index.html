<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お薬わすれん坊・完全版</title>
    <style>
        /* --- モーダル・共通スタイル --- */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        /* ボタン点滅アニメーション */
        @keyframes blink {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        .blink-btn {
            animation: blink 1.2s infinite;
            background-color: #d32f2f !important;
            border: 2px solid white;
        }

        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px 10px;
            background-color: #f4f7f9;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 550px;
            margin: 0 auto;
        }

        #clock {
            font-size: 1.2em;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
        }

        /* アラーム設定エリア */
        .alarm-box {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #856404;
            text-align: left;
        }

        /* 検索窓 */
        .search-area {
            margin: 15px 0;
        }

        .search-area input {
            width: 100%;
            padding: 12px;
            border: 2px solid #008080;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* 新規登録・編集用フォーム */
        .form-box {
            background: #e6f2f2;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
            transition: all 0.3s;
        }

        .form-box strong {
            display: block;
            text-align: center;
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #008080;
        }

        .form-box input,
        .form-box button,
        .weekday-checkboxes {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        .form-box input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        /* 曜日選択エリア */
        .weekday-checkboxes {
            display: flex;
            justify-content: space-evenly;
            background: white;
            padding: 10px 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .weekday-checkboxes label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            padding: 0 2px;
        }

        .weekday-checkboxes input {
            margin: 4px 0 0 0;
            width: auto;
        }

        /* 日付タブ */
        .tab-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            background: #ddd;
            padding: 3px;
            border-radius: 8px;
            font-size: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 6px 0;
            background: none;
            color: #333;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #002D62;
            color: white;
        }

        /* 状況表示バー */
        .info-bar {
            margin: 10px 0;
            font-size: 14px;
            color: #d32f2f;
            font-weight: bold;
        }

        /* 利用者カードの基本設定 */
        .user-card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 未服薬：薄い赤 */
        .status-waiting {
            background-color: #ffeef0;
            border-left: 6px solid #d32f2f;
            /* 左側に赤いラインを入れて強調 */
        }

        /* 服薬完了：薄いグレー */
        .status-done {
            background-color: #f0f0f0;
            color: #888;
            border-left: 6px solid #bbb;
        }


        /* 編集時のハイライト */
        .user-card.editing {
            border: 2px solid #ff9800 !important;
            background-color: #fff9c4 !important;
        }

        .user-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        button {
            font-size: 16px;
            padding: 10px 15px;
            background-color: #008080;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-confirm {
            min-width: 70px;
        }

        .btn-action {
            font-size: 12px;
            padding: 5px 8px;
            background: #555;
        }

        .status-done {
            background-color: #bbb !important;
        }

        /* データ同期エリア */
        .sync-box {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: left;
            font-size: 14px;
        }

        .sync-box strong {
            display: block;
            text-align: center;
            font-size: 1.3em;
            margin-bottom: 15px;
        }

        .sync-box textarea {
            width: 100%;
            height: 80px;
            margin: 10px 0;
            font-size: 12px;
            font-family: monospace;
            background-color: #fff;
            box-sizing: border-box;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .btn-group button {
            flex: 1;
            font-size: 13px;
            padding: 10px 5px;
        }

        /* 簡易通知（トースト） */
        #toast {
            visibility: hidden;
            min-width: 280px;
            /* 少し大きく */
            background-color: #008080;
            color: #fff;
            text-align: center;
            border-radius: 10px;
            padding: 20px;
            /* 余白を大きく */
            position: fixed;
            top: -100px;
            /* 最初は画面外の上の位置 */
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-size: 1.2em;
            /* 文字を大きく */
            font-weight: bold;
        }

        #toast.show {
            visibility: visible;
            /* 0.5秒でスライドイン、2秒停止、0.5秒でフェードアウト */
            animation: slide-center 3s forwards;
        }

        @keyframes slide-center {
            0% {
                top: -100px;
                opacity: 0;
            }

            /* 上の外から */
            20% {
                top: 50%;
                opacity: 1;
            }

            /* 20%地点で中央へ */
            80% {
                top: 50%;
                opacity: 1;
            }

            /* 80%地点まで中央で停止 */
            100% {
                top: 50%;
                opacity: 0;
            }

            /* 最後にフェードアウト */
        }
    </style>
</head>

<body>
    <div id="modal-overlay">
        <div class="modal-content">
            <h3>⚠️ 音声機能のご利用について</h3>
            <p style="text-align: left; line-height: 1.6;">
                1.<strong>PCのスリープモードをOFF</strong>にしてください。<br>
                2.<strong>PCの音量を適度な大きさに</strong>してください。<br>
                3. 「音声有効化」ボタンを押してください。
            </p>
            <button id="close-modal-btn" style="width: 100%; padding: 15px; font-size: 1.1em;">OK</button>
        </div>
    </div>

    <div class="container">
        <h2>💊 お薬わすれん坊</h2>
        <p>
            made by 遠矢 洋介
        </p>
        <div id="clock">読み込み中...</div>

        <div class="btn-group" style="margin-bottom: 20px;">
            <button id="test-audio-btn" onclick="testAlarmVolume()" style="background-color: #555; flex: 1;">🔊
                音量テスト</button>

            <button id="start-btn" class="blink-btn" onclick="enableAudio()" style="flex: 2;">📢 音声を有効化</button>
        </div>

        <div class="alarm-box">
            🔔 アラーム継続: <input type="number" id="alarm-duration" value="3" min="1" max="10" style="width: 50px;"> 分
            <button id="stop-alarm-btn" onclick="stopAlarm()"
                style="display:none; background-color:#d32f2f; margin-top:5px; width:100%;">🚨 アラーム停止</button>
        </div>
        <br>

        <div class="tab-box">
            <button class="tab-btn" id="tab-全" onclick="switchDay('全')">全</button>
            <button class="tab-btn" id="tab-日" onclick="switchDay('日')">日</button>
            <button class="tab-btn" id="tab-月" onclick="switchDay('月')">月</button>
            <button class="tab-btn" id="tab-火" onclick="switchDay('火')">火</button>
            <button class="tab-btn" id="tab-水" onclick="switchDay('水')">水</button>
            <button class="tab-btn" id="tab-木" onclick="switchDay('木')">木</button>
            <button class="tab-btn" id="tab-金" onclick="switchDay('金')">金</button>
            <button class="tab-btn" id="tab-土" onclick="switchDay('土')">土</button>
        </div>

        <div id="info-bar" class="info-bar"></div>
        <div class="search-area">
            <input type="text" id="search-input" placeholder="🔍 お名前で検索..." oninput="renderList()">
        </div>

        <div id="user-list"></div>
        <button onclick="deleteSelected()" style="width: 100%; background-color: #d32f2f; margin-bottom: 10px;">🗑
            選択した利用者を削除</button>
        <button onclick="resetStatus()" style="width: 100%; background-color: #555;">🔄 服薬リセット</button>

        <div class="form-box">
            <strong id="form-title">👤 利用者の新規登録</strong>
            <input type="hidden" id="edit-id">
            <label>お名前</label><input type="text" id="new-name" placeholder="お名前">
            <label>利用曜日</label>
            <div class="weekday-checkboxes">
                <label>日<input type="checkbox" name="weekdays" value="日"></label>
                <label>月<input type="checkbox" name="weekdays" value="月"></label>
                <label>火<input type="checkbox" name="weekdays" value="火"></label>
                <label>水<input type="checkbox" name="weekdays" value="水"></label>
                <label>木<input type="checkbox" name="weekdays" value="木"></label>
                <label>金<input type="checkbox" name="weekdays" value="金"></label>
                <label>土<input type="checkbox" name="weekdays" value="土"></label>
            </div>
            <label>時間</label><input type="time" id="new-time">
            <label>お薬</label><input type="text" id="new-medicine" placeholder="薬の名前">
            <button id="submit-btn" onclick="saveUser()">登録</button>
            <button id="cancel-btn" onclick="resetForm()" style="background-color: #666; display:none;">キャンセル</button>
        </div>

        <div class="sync-box">
            <strong>📊 データ管理</strong>
            <div style="margin: 10px 0;">
                <label>自動リセット時刻:</label>
                <input type="time" id="reset-time-input" onchange="saveResetTime()">
            </div>

            <textarea id="csv-text" placeholder="JSONデータの貼り付け・書き出し用"></textarea>

            <button onclick="importFromPaste()" style="background-color: #d84315;">📋 貼り付けで読み込み</button>

            <div class="btn-group">
                <button onclick="exportJSON()" style="background-color: #2e7d32;">📤 JSON書き出し</button>
                <button onclick="importJSON(true)" style="background-color: #b71c1c;">📥 JSON上書き</button>
                <button onclick="importJSON(false)" style="background-color: #1a237e;">➕ JSON追加</button>
            </div>

            <div class="btn-group" style="margin-top: 10px;">
                <button onclick="downloadCSV()" style="background-color: #008080;">📥 CSVダウンロード</button>
                <button onclick="triggerCSVImport(true)" style="background-color: #b71c1c;">📥 CSV上書き</button>
                <button onclick="triggerCSVImport(false)" style="background-color: #1a237e;">➕ CSV追加</button>
            </div>

            <input type="file" id="csv-file-input" style="display:none" onchange="handleCSVFile(event)">
            <input type="hidden" id="import-mode">

            <button onclick="initializeAll()" style="background-color: #333; width: 100%; margin-top: 15px;">⚠️
                全データ初期化</button>
        </div>
    </div>

    <div id="toast">登録しました！</div>

    <script>
        // 設定定数と初期データ管理
        const STORAGE_KEY = "daycare_users_v2";
        const RESET_TIME_KEY = "auto_reset_time_key"; // 保存用のキー
        let users = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        // ページ読み込み時に保存された時刻を取得（デフォルトは05:00）
        let autoResetTime = localStorage.getItem(RESET_TIME_KEY) || "05:00";
        document.getElementById("reset-time-input").value = autoResetTime;

        // 時刻を保存する関数
        function saveResetTime() {
            autoResetTime = document.getElementById("reset-time-input").value;
            localStorage.setItem(RESET_TIME_KEY, autoResetTime);
        }

        // 自動リセット時刻の設定
        const AUTO_RESET_TIME = "05:00";

        // アラーム音源の定義
        let alarmAudio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        alarmAudio.loop = true;
        let alarmTimer = null;

        // 初期データが空の場合のサンプル設定
        if (users.length === 0) {
            users = [
                { id: "1", name: "佐藤 一郎", time: "09:00", medicine: "朝食後", weekdays: ["日", "月", "火", "水", "木", "金", "土"], status: "未" },
                { id: "2", name: "鈴木 花子", time: "10:30", medicine: "血圧のお薬", weekdays: ["月", "水", "金"], status: "未" },
                { id: "3", name: "山田 太郎", time: "1:30", medicine: "血圧のお薬", weekdays: ["月", "火", "水", "木", "金"], status: "未" },
            ];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
        }

        // 音量テスト用：鳴らして3秒後に自動停止
        function testAlarmVolume() {
            alarmAudio.play();
            setTimeout(() => {
                alarmAudio.pause();
                alarmAudio.currentTime = 0;
            }, 3000); // 3秒間鳴らす
        }

        // 音声機能の有効化（確認メッセージ付き）
        function enableAudio() {
            isAudioEnabled = true;
            // 実際に聞こえるか確認するメッセージ
            const msg = new SpeechSynthesisUtterance("音声機能が有効になりました。この音量は聞こえますか？");
            window.speechSynthesis.speak(msg);

            const btn = document.getElementById("start-btn");
            btn.classList.remove("blink-btn");
            btn.innerText = "📢 音声有効化済み";
            btn.style.backgroundColor = "#ccc";
        }

        let currentSelectedDay = ["日", "月", "火", "水", "木", "金", "土"][new Date().getDay()];
        let isAudioEnabled = false;

        // 現在時刻を更新・表示する
        function updateClock() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0'); // 秒を取得

            const timeStr = `${hours}:${minutes}:${seconds}`; // 秒を追加した形式
            const dateStr = now.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });

            // 日付の下に時刻（秒付き）を大きく表示
            document.getElementById('clock').innerHTML = dateStr + "<br><span style='font-size: 1.5em; color:#008080;'>" + timeStr + "</span>";

            // アラーム判定（秒単位の考慮が必要な場合はここも調整します）
            checkAlarm(hours + ":" + minutes);
        }

        setInterval(updateClock, 1000);
        updateClock();

        // モーダル閉じるボタン
        document.getElementById("close-modal-btn").addEventListener("click", () => document.getElementById("modal-overlay").style.display = "none");

        // 音声機能の有効化
        function enableAudio() {
            isAudioEnabled = true;

            // テスト音声を鳴らす
            const testUtterance = new SpeechSynthesisUtterance("音声機能が有効になりました。この音量は聞こえますか？");
            window.speechSynthesis.speak(testUtterance);

            const btn = document.getElementById("start-btn");
            btn.classList.remove("blink-btn");
            btn.innerText = "📢 音声有効化済み";
            btn.style.backgroundColor = "#ccc";
        }


        function renderList() {
            const listContainer = document.getElementById("user-list");
            // 絞り込みだけ行う
            const filtered = users.filter(u => (currentSelectedDay === '全' || u.weekdays.includes(currentSelectedDay)) && u.name.includes(document.getElementById("search-input").value));
            listContainer.innerHTML = "";

            // ★時刻を数値（分単位）に変換して並び替える
            filtered.sort((a, b) => {
                const getTimeValue = (timeStr) => {
                    const [hour, minute] = timeStr.split(':').map(Number);
                    return hour * 60 + minute; // 時間を「分」に変換
                };
                return getTimeValue(a.time) - getTimeValue(b.time);
            });

            filtered.forEach(user => {
                const card = document.createElement("div");
                card.className = "user-card " + (user.status === '完了' ? 'status-done' : 'status-waiting');
                card.dataset.id = user.id;

                const dayDisplay = `（${user.weekdays.join('')}）`;
                card.innerHTML = `
            <div style="display:flex; align-items:center;">
                <input type="checkbox" class="delete-check" value="${user.id}" style="margin-right:10px; transform:scale(1.5);">
                <div>
                    <span class="user-name">${user.name}</span> <small>${dayDisplay}</small><br>
                    ⏰ ${user.time} | 💊 ${user.medicine}
                </div>
            </div>
            <div>
                <button onclick="editUser('${user.id}', this)" class="btn-action">編集</button>
                <button onclick="toggleMedication('${user.id}')" class="btn-confirm">
                    ${user.status === '完了' ? '✓ 完了' : '確認'}
                </button>
            </div>
        `;
                listContainer.appendChild(card);
            });

            // 下部のステータス表示
            document.getElementById("info-bar").innerText = filtered.filter(u => u.status !== '完了').length > 0
                ? `⚠️ 未服薬：${filtered.filter(u => u.status !== '完了').length}名`
                : "✅ 全員完了";
        }


        // 利用者情報の編集モード移行
        function editUser(id, btnElement) {
            document.querySelectorAll('.user-card').forEach(card => card.classList.remove('editing'));
            const targetCard = btnElement.closest('.user-card');
            targetCard.classList.add('editing');
            document.querySelector('.form-box').scrollIntoView({ behavior: 'smooth' });

            const u = users.find(x => x.id === id);
            document.getElementById("edit-id").value = u.id;
            document.getElementById("new-name").value = u.name;
            document.getElementById("new-time").value = u.time;
            document.getElementById("new-medicine").value = u.medicine;
            document.querySelectorAll('input[name="weekdays"]').forEach(cb => cb.checked = u.weekdays.includes(cb.value));

            document.getElementById("form-title").innerHTML = `✏️ 編集中: <span style="color:#d32f2f">${u.name}</span>`;
            document.getElementById("submit-btn").innerText = "内容を更新する";
            document.getElementById("cancel-btn").style.display = "block";
        }

        // フォームのリセット（曜日チェックも外すように修正）
        function resetForm() {
            document.querySelectorAll('.user-card').forEach(card => card.classList.remove('editing'));
            document.getElementById("edit-id").value = "";
            document.getElementById("new-name").value = "";
            document.getElementById("new-medicine").value = "";
            document.getElementById("new-time").value = ""; // ついでに時間も空にすると便利です

            // 曜日チェックボックスをすべて外す
            document.querySelectorAll('input[name="weekdays"]').forEach(cb => cb.checked = false);

            document.getElementById("form-title").innerText = "👤 利用者の新規登録";
            document.getElementById("submit-btn").innerText = "登録";
            document.getElementById("cancel-btn").style.display = "none";
        }

        // 選択した利用者の削除
        function deleteSelected() {
            const checked = Array.from(document.querySelectorAll('.delete-check:checked')).map(cb => cb.value);
            if (checked.length === 0) return alert("削除する利用者を選択してください");
            if (confirm(checked.length + "名を削除しますか？")) {
                users = users.filter(u => !checked.includes(u.id));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                renderList();
            }
        }

        // 服薬完了の切り替え
        function toggleMedication(id) {
            const u = users.find(u => u.id === id);

            // ステータスを反転（完了なら未へ、未なら完了へ）
            u.status = u.status === '完了' ? '未' : '完了';

            // 音声読み上げ（完了にした時だけ喋る）
            if (u.status === '完了' && isAudioEnabled && window.speechSynthesis) {
                try {
                    const msg = new SpeechSynthesisUtterance(u.name + "さん、服薬しました");
                    window.speechSynthesis.speak(msg);
                } catch (e) { }
            }

            // データを保存
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));

            // リストを再描画（並び替えは行わない）
            renderList();
        }

        // 自動リセット実行用関数
        function autoResetStatus() {
            users.forEach(u => u.status = "未");
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
            renderList();
        }

        // 曜日タブの切り替え
        function switchDay(day) {
            currentSelectedDay = day;
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.id === `tab-${day}`));
            renderList();
        }

        // 新規保存・更新保存
        function saveUser() {
            const id = document.getElementById("edit-id").value;
            const userData = {
                name: document.getElementById("new-name").value,
                time: document.getElementById("new-time").value,
                medicine: document.getElementById("new-medicine").value,
                weekdays: Array.from(document.querySelectorAll('input[name="weekdays"]:checked')).map(b => b.value)
            };
            if (!userData.name) return alert("名前を入力してください");

            if (id) {
                Object.assign(users.find(x => x.id === id), userData);
                showToast("更新しました！"); // 追加
            } else {
                users.push({ ...userData, id: String(Date.now()), status: "未" });
                showToast("登録しました！"); // 追加
            }

            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
            resetForm(); renderList();
        }

        // トースト通知を表示する関数
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 3000);
        }

        // 全員のステータスリセット
        function resetStatus() {
            if (confirm("全員のステータスをリセットしますか？")) {
                users.forEach(u => u.status = "未");
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                renderList();
            }
        }

        // [貼り付けで読み込み]の機能追加
        function importFromPaste() {
            // 1. テキストエリアから貼り付けられたデータを取得
            const text = document.getElementById("csv-text").value;
            if (!text) return alert("テキストエリアにデータを貼り付けてください");

            // 2. 行ごとにデータを分割（改行コードで区切る）
            const rows = text.split('\n');
            const newUsers = [];

            // 3. 各行をループ処理して利用者データを抽出
            rows.forEach((row, i) => {
                // 空行はスキップ
                if (!row.trim()) return;

                // 4. 行の中身を「タブ（Tab）」で区切って項目ごとに分ける
                // ※Excelやスプレッドシートからコピーすると自動的にタブが入る性質を利用
                const cols = row.split('\t');

                // 5. データが4つ以上ある場合のみ処理（名前,時刻,曜日,薬）
                if (cols.length >= 4) {
                    newUsers.push({
                        // ユニークなIDを現在時刻＋連番で生成
                        id: String(Date.now() + i),
                        name: cols[0],      // 1列目：名前
                        time: cols[1],      // 2列目：時間
                        // 曜日文字列を1文字ずつ配列に変換（例: "月火" -> ["月", "火"]）
                        weekdays: cols[2].split(''),
                        medicine: cols[3],  // 4列目：お薬
                        status: "未"        // 初期状態は「未」
                    });
                }
            });

            // 6. 読み込み成功時の処理
            if (newUsers.length > 0) {
                // 既存のユーザーリストに新データを追加
                users = users.concat(newUsers);
                // ローカルストレージに最新状態を保存
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                // 画面を更新してリストを表示
                renderList();

                // テキストエリアを空にして、二重読み込みを防ぐ
                document.getElementById("csv-text").value = "";

                alert(newUsers.length + "名を読み込みました！");
            } else {
                // データが読み込めなかった場合の警告
                alert("読み込めませんでした。タブ区切りで貼り付けてください。");
            }
        }

        // 【JSON書き出し】テキストエリアにJSONを表示
        function exportJSON() {
            document.getElementById("csv-text").value = JSON.stringify(users);
        }

        // 【JSON読み込み】テキストエリアのJSONを反映
        function importJSON(isOverwrite) {
            try {
                const inputData = JSON.parse(document.getElementById("csv-text").value);
                users = isOverwrite ? inputData : users.concat(inputData);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                renderList();
                alert("JSONデータを読み込みました");
            } catch {
                alert("JSONデータ形式エラーです");
            }
        }

        // 【CSVダウンロード】Excel/スプレッドシート用
        function downloadCSV() {
            let csvContent = "名前,時刻,曜日,薬\n";
            users.forEach(u => {
                const row = [u.name, u.time, u.weekdays.join(""), u.medicine].join(",");
                csvContent += row + "\n";
            });
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "yakuzai_list.csv";
            link.click();
        }

        // 【CSV読み込み用】トリガー関数（ファイル選択ダイアログを開く）
        function triggerCSVImport(isOverwrite) {
            document.getElementById('import-mode').value = isOverwrite ? 'overwrite' : 'append';
            document.getElementById('csv-file-input').click();
        }

        // 【CSV読み込み】選択されたファイルを解析して反映
        function handleCSVFile(event) {
            const file = event.target.files[0];
            const isOverwrite = document.getElementById('import-mode').value === 'overwrite';
            const reader = new FileReader();

            reader.onload = function (e) {
                const text = e.target.result;
                const rows = text.split('\n');
                const newUsers = [];

                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i].trim()) continue;
                    const cols = rows[i].split(',');
                    if (cols.length < 4) continue;
                    newUsers.push({
                        id: String(Date.now() + i),
                        name: cols[0],
                        time: cols[1],
                        weekdays: cols[2].split(''),
                        medicine: cols[3],
                        status: "未"
                    });
                }

                users = isOverwrite ? newUsers : users.concat(newUsers);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                renderList();
                alert("CSVデータを読み込みました");
            };
            reader.readAsText(file);
        }

        // 全データ初期化
        function initializeAll() {
            if (confirm("全データを削除しますか？")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        // 読み込み時実行
        window.onload = () => { renderList(); switchDay(currentSelectedDay); };

        // アラーム判定
        function checkAlarm(nowTime) {
            // 現在時刻と保存された設定時刻を比較
            if (nowTime === autoResetTime) {
                autoResetStatus();
            }

            if (!isAudioEnabled) return;
            const duration = parseInt(document.getElementById("alarm-duration").value) * 60000;
            const today = ["日", "月", "火", "水", "木", "金", "土"][new Date().getDay()];

            const isTarget = users.some(u => u.time === nowTime && u.status === '未' && u.weekdays.includes(today));

            if (isTarget && !alarmTimer) {
                alarmAudio.play();
                document.getElementById("stop-alarm-btn").style.display = "block";
                alarmTimer = setTimeout(stopAlarm, duration);
            }
        }

        // アラーム停止
        function stopAlarm() {
            alarmAudio.pause();
            alarmAudio.currentTime = 0;
            document.getElementById("stop-alarm-btn").style.display = "none";
            clearTimeout(alarmTimer);
            alarmTimer = null;
        }

    </script>
</body>
