<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お薬わすれん坊</title>
    <style>
        * {
            box-sizing: border-box;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        @keyframes pulse-red {

            0%,
            100% {
                background-color: #ffeef0;
            }

            50% {
                background-color: #ffcccc;
            }
        }

        @keyframes pulse-overdue {

            0%,
            100% {
                background-color: #fce4ec;
                border-left-color: #880e4f;
            }

            50% {
                background-color: #f48fb1;
                border-left-color: #c2185b;
            }
        }

        @keyframes slide-center {
            0% {
                top: -100px;
                opacity: 0;
            }

            20% {
                top: 50%;
                opacity: 1;
            }

            80% {
                top: 50%;
                opacity: 1;
            }

            100% {
                top: 50%;
                opacity: 0;
            }
        }

        body {
            font-family: sans-serif;
            text-align: center;
            padding: 15px 10px;
            background: #f0f4f8;
            margin: 0;
        }

        .container {
            background: white;
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            max-width: 580px;
            margin: 0 auto;
        }

        h2 {
            margin: 0 0 8px;
            color: #005f5f;
            font-size: 1.4em;
        }

        #clock {
            font-size: 1.1em;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
        }

        #summary-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .summary-card {
            flex: 1;
            border-radius: 10px;
            padding: 10px 6px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
        }

        .summary-card.total {
            background: #e3f2fd;
            color: #1565c0;
        }

        .summary-card.done {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .summary-card.pending {
            background: #fce4ec;
            color: #c62828;
        }

        .summary-card.absent {
            background: #e8eaf6;
            color: #3949ab;
        }

        .summary-card .num {
            font-size: 1.8em;
            display: block;
        }

        #backup-bar {
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            border-radius: 8px;
            padding: 7px 12px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #2e7d32;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #backup-bar.warn {
            background: #fff3e0;
            border-color: #ffcc80;
            color: #e65100;
        }

        #backup-bar button {
            font-size: 11px;
            padding: 4px 8px;
            background: #2e7d32;
        }

        #backup-bar.warn button {
            background: #e65100;
            animation: blink 1.2s infinite;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .btn-group button {
            flex: 1;
        }

        .alarm-box {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #856404;
            text-align: left;
        }

        .tab-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            background: #ddd;
            padding: 3px;
            border-radius: 8px;
            font-size: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 6px 0;
            background: none;
            color: #333;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #002D62;
            color: white;
        }

        .info-bar {
            margin: 8px 0;
            font-size: 14px;
            color: #d32f2f;
            font-weight: bold;
        }

        .search-area {
            margin: 10px 0;
        }

        .search-area input {
            width: 100%;
            padding: 11px;
            border: 2px solid #008080;
            border-radius: 8px;
            font-size: 16px;
        }

        .sort-control {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            align-items: center;
            justify-content: flex-end;
        }

        .sort-control label {
            color: #555;
        }

        .sort-control select {
            padding: 4px 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }

        .user-card {
            border: 1px solid #ddd;
            padding: 13px 12px;
            margin: 8px 0;
            border-radius: 10px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .status-waiting {
            background: #ffeef0;
            border-left: 6px solid #d32f2f;
        }

        .status-warning {
            background: #fff8e1;
            border-left: 6px solid #ff8f00;
        }

        .status-urgent {
            animation: pulse-red 1s infinite;
            border-left: 6px solid #b71c1c;
        }

        .status-overdue {
            border-left: 6px solid #880e4f;
            animation: pulse-overdue 1s infinite;
        }

        .status-done {
            background: #f5f5f5;
            color: #999;
            border-left: 6px solid #bbb;
        }

        .status-absent {
            background: #e8eaf6;
            color: #9fa8da;
            border-left: 6px solid #5c6bc0;
        }

        .user-card.editing {
            border: 2px solid #ff9800 !important;
            background: #fff9c4 !important;
        }

        .user-name {
            font-size: 17px;
            font-weight: bold;
            color: #333;
        }

        .time-badge {
            display: inline-block;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 10px;
            margin-left: 5px;
            font-weight: bold;
        }

        .badge-warn {
            background: #ff8f00;
            color: white;
        }

        .badge-urgent {
            background: #d32f2f;
            color: white;
        }

        .badge-overdue {
            background: #880e4f;
            color: white;
        }

        .badge-absent {
            background: #5c6bc0;
            color: white;
        }

        button {
            font-size: 15px;
            padding: 10px 14px;
            background: #008080;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:active {
            opacity: 0.8;
        }

        .blink-btn {
            animation: blink 1.2s infinite;
            background: #d32f2f !important;
            border: 2px solid white;
        }

        .btn-confirm {
            min-width: 68px;
        }

        .btn-absent {
            font-size: 12px;
            padding: 5px 8px;
            background: #5c6bc0;
        }

        .btn-action {
            font-size: 12px;
            padding: 5px 8px;
            background: #555;
        }

        .btn-undo {
            font-size: 12px;
            padding: 5px 8px;
            background: #888;
        }

        .form-box {
            background: #e6f2f2;
            padding: 15px;
            border-radius: 10px;
            margin-top: 18px;
            text-align: left;
        }

        .form-box strong {
            display: block;
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 12px;
            color: #008080;
        }

        .form-box input,
        .form-box button,
        .weekday-checkboxes {
            width: 100%;
            margin-bottom: 10px;
        }

        .form-box input {
            padding: 9px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        .weekday-checkboxes {
            display: flex;
            justify-content: space-evenly;
            background: white;
            padding: 10px 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .weekday-checkboxes label {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            padding: 0 2px;
        }

        .weekday-checkboxes input {
            margin: 4px 0 0 0;
            width: auto;
        }

        .sync-box {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 24px;
            text-align: left;
            font-size: 14px;
        }

        .sync-box>strong {
            display: block;
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 12px;
        }

        .sync-box textarea {
            width: 100%;
            height: 75px;
            margin: 8px 0;
            font-size: 12px;
            font-family: monospace;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 6px;
        }

        .btn-group-sm {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .btn-group-sm button {
            flex: 1;
            font-size: 12px;
            padding: 9px 4px;
        }

        .staff-form-box {
            background: #e8f4f4;
            border-radius: 8px;
            padding: 12px;
            margin-top: 14px;
        }

        .staff-form-box strong {
            display: block;
            text-align: center;
            font-size: 1.05em;
            margin-bottom: 10px;
            color: #008080;
        }

        #staff-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 998;
            justify-content: center;
            align-items: center;
        }

        #staff-modal.show {
            display: flex;
        }

        .staff-modal-content {
            background: white;
            padding: 22px;
            border-radius: 15px;
            width: 90%;
            max-width: 360px;
            text-align: center;
        }

        .staff-modal-content h3 {
            margin: 0 0 12px;
            color: #008080;
            font-size: 1.05em;
        }

        .staff-target {
            background: #f0f0f0;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
            font-size: 14px;
            text-align: left;
        }

        .staff-modal-content.absent-mode h3 {
            color: #3949ab;
        }

        .staff-modal-content.absent-mode .staff-btn-list button {
            background: #5c6bc0;
        }

        .staff-btn-list {
            display: flex;
            flex-direction: column;
            gap: 7px;
            max-height: 280px;
            overflow-y: auto;
        }

        .staff-btn-list button {
            background: #008080;
            font-size: 15px;
            padding: 12px;
        }

        #staff-modal-cancel {
            margin-top: 10px;
            background: #888;
            width: 100%;
        }

        .log-box {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-top: 18px;
            padding: 14px;
            text-align: left;
            font-size: 13px;
        }

        .log-box>strong {
            display: block;
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .log-filter {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .log-filter select {
            flex: 1;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 13px;
        }

        .log-entry {
            padding: 7px 8px;
            border-bottom: 1px solid #eee;
            line-height: 1.6;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-entry.log-absent {
            background: #f0f0fa;
            color: #5c6bc0;
        }

        .audio-settings {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
            font-size: 13px;
            text-align: left;
        }

        .audio-settings label {
            display: block;
            margin-bottom: 6px;
            color: #555;
        }

        .audio-settings select {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 13px;
            margin-bottom: 8px;
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 28px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 380px;
        }

        #toast {
            visibility: hidden;
            min-width: 260px;
            background: #008080;
            color: #fff;
            text-align: center;
            border-radius: 10px;
            padding: 18px;
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-size: 1.1em;
            font-weight: bold;
        }

        #toast.show {
            visibility: visible;
            animation: slide-center 3s forwards;
        }
    </style>
</head>

<body>

    <!-- 職員選択モーダル（服薬確認・休み共用） -->
    <div id="staff-modal">
        <div class="staff-modal-content" id="staff-modal-inner">
            <h3 id="staff-modal-title">👤 確認した職員を選んでください</h3>
            <div class="staff-target" id="staff-modal-target"></div>
            <div class="staff-btn-list" id="staff-btn-list"></div>
            <button id="staff-modal-cancel" onclick="closeStaffModal()">キャンセル</button>
        </div>
    </div>

    <!-- 起動モーダル -->
    <div id="modal-overlay">
        <div class="modal-content">
            <h3>⚠️ 音声機能のご利用について</h3>
            <p style="text-align:left; line-height:1.7;">
                1. <strong>PCのスリープモードをOFF</strong>にしてください。<br>
                2. <strong>PCの音量を適度な大きさに</strong>してください。<br>
                3. 「音声有効化」ボタンを押してください。
            </p>
            <button id="close-modal-btn" style="width:100%; padding:14px; font-size:1.05em;">OK</button>
        </div>
    </div>

    <div class="container">
        <h2>💊 お薬わすれん坊</h2>
        <div id="clock">読み込み中...</div>

        <!-- サマリーバー -->
        <div id="summary-bar">
            <div class="summary-card total">
                <span class="num" id="sum-total">0</span>本日対象
            </div>
            <div class="summary-card done">
                <span class="num" id="sum-done">0</span>服薬完了
            </div>
            <div class="summary-card pending">
                <span class="num" id="sum-pending">0</span>未服薬
            </div>
            <div class="summary-card absent">
                <span class="num" id="sum-absent">0</span>休み
            </div>
        </div>

        <!-- バックアップバー -->
        <div id="backup-bar">
            <span id="backup-status">確認中...</span>
            <button onclick="manualBackup()">💾 今すぐ保存</button>
        </div>

        <!-- 音声設定 -->
        <div class="audio-settings">
            <label>🔊 アラーム音の種類</label>
            <select id="alarm-sound-select" onchange="changeAlarmSound()">
                <option value="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">ビープ音（デフォルト）</option>
                <option value="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">目覚まし時計</option>
                <option value="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg">デジタルアラーム
                </option>
            </select>
        </div>

        <div class="btn-group">
            <button onclick="testAlarmVolume()" style="background:#555; flex:1;">🔊 音量テスト</button>
            <button id="start-btn" class="blink-btn" onclick="enableAudio()" style="flex:2;">📢 音声を有効化</button>
        </div>

        <!-- アラーム設定 -->
        <div class="alarm-box">
            🔔 アラーム継続: <input type="number" id="alarm-duration" value="3" min="1" max="10" style="width:48px;"> 分
            <div style="display:flex; gap:6px; align-items:center; margin-top:8px;">
                <label style="font-size:13px; white-space:nowrap;">💤 スヌーズ：</label>
                <select id="snooze-duration"
                    style="flex:1; padding:5px; border:1px solid #ccc; border-radius:5px; font-size:13px;">
                    <option value="1">1分後</option>
                    <option value="2">2分後</option>
                    <option value="3" selected>3分後</option>
                    <option value="5">5分後</option>
                    <option value="10">10分後</option>
                </select>
                <button onclick="snoozeAlarm()" style="background:#ff8f00; white-space:nowrap; padding:8px 12px;">💤
                    スヌーズ</button>
            </div>
            <div id="snooze-status"
                style="display:none; margin-top:6px; background:#fff3e0; border:1px solid #ffcc80; border-radius:6px; padding:6px 10px; font-size:13px; color:#e65100; text-align:center;">
            </div>
            <button id="stop-alarm-btn" onclick="stopAlarm()"
                style="display:none; background:#d32f2f; margin-top:6px; width:100%;">🚨 アラーム停止</button>
        </div>

        <div class="tab-box">
            <button class="tab-btn" id="tab-全" onclick="switchDay('全')">全</button>
            <button class="tab-btn" id="tab-日" onclick="switchDay('日')">日</button>
            <button class="tab-btn" id="tab-月" onclick="switchDay('月')">月</button>
            <button class="tab-btn" id="tab-火" onclick="switchDay('火')">火</button>
            <button class="tab-btn" id="tab-水" onclick="switchDay('水')">水</button>
            <button class="tab-btn" id="tab-木" onclick="switchDay('木')">木</button>
            <button class="tab-btn" id="tab-金" onclick="switchDay('金')">金</button>
            <button class="tab-btn" id="tab-土" onclick="switchDay('土')">土</button>
        </div>

        <div id="info-bar" class="info-bar"></div>

        <div class="search-area">
            <input type="text" id="search-input" placeholder="🔍 お名前で検索..." oninput="renderList()">
        </div>

        <div class="sort-control">
            <label>並び順：</label>
            <select id="sort-select" onchange="renderList()">
                <option value="time">服薬時刻順</option>
                <option value="status">未完了を上に</option>
                <option value="name">名前順</option>
            </select>
        </div>

        <div id="user-list"></div>

        <div class="btn-group" style="margin-top:10px;">
            <button onclick="deleteSelected()" style="background:#d32f2f; flex:1;">🗑 選択削除</button>
            <button onclick="resetStatus()" style="background:#555; flex:1;">🔄 服薬リセット</button>
        </div>

        <!-- 利用者登録フォーム -->
        <div class="form-box">
            <strong id="form-title">👤 利用者の新規登録</strong>
            <input type="hidden" id="edit-id">
            <label>お名前</label>
            <input type="text" id="new-name" placeholder="お名前">
            <label>利用曜日</label>
            <div class="weekday-checkboxes">
                <label>日<input type="checkbox" name="weekdays" value="日"></label>
                <label>月<input type="checkbox" name="weekdays" value="月"></label>
                <label>火<input type="checkbox" name="weekdays" value="火"></label>
                <label>水<input type="checkbox" name="weekdays" value="水"></label>
                <label>木<input type="checkbox" name="weekdays" value="木"></label>
                <label>金<input type="checkbox" name="weekdays" value="金"></label>
                <label>土<input type="checkbox" name="weekdays" value="土"></label>
            </div>
            <label>時間</label>
            <input type="time" id="new-time">
            <label>お薬</label>
            <input type="text" id="new-medicine" placeholder="薬の名前">
            <button id="submit-btn" onclick="saveUser()">登録</button>
            <button id="cancel-btn" onclick="resetForm()" style="background:#666; display:none;">キャンセル</button>
        </div>

        <!-- データ管理 -->
        <div class="sync-box">
            <strong>📊 データ管理</strong>
            <div style="margin:10px 0;">
                <label>自動リセット時刻：</label>
                <input type="time" id="reset-time-input" onchange="saveResetTime()"
                    style="padding:5px; border:1px solid #ccc; border-radius:4px;">
            </div>
            <textarea id="csv-text" placeholder="JSONデータの貼り付け・書き出し用"></textarea>
            <button onclick="importFromPaste()" style="background:#d84315; width:100%; margin-bottom:6px;">📋
                貼り付けで読み込み</button>
            <div class="btn-group-sm">
                <button onclick="exportJSON()" style="background:#2e7d32;">📤 JSON書き出し</button>
                <button onclick="importJSON(true)" style="background:#b71c1c;">📥 JSON上書き</button>
                <button onclick="importJSON(false)" style="background:#1a237e;">➕ JSON追加</button>
            </div>
            <div class="btn-group-sm" style="margin-top:8px;">
                <button onclick="downloadCSV()" style="background:#008080;">📥 CSVダウンロード</button>
                <button onclick="triggerCSVImport(true)" style="background:#b71c1c;">📥 CSV上書き</button>
                <button onclick="triggerCSVImport(false)" style="background:#1a237e;">➕ CSV追加</button>
            </div>
            <input type="file" id="csv-file-input" style="display:none" onchange="handleCSVFile(event)">
            <input type="hidden" id="import-mode">
            <button onclick="initializeAll()" style="background:#333; width:100%; margin-top:12px;">⚠️ 全データ初期化</button>

            <!-- 職員マスタ -->
            <div class="staff-form-box">
                <strong>👥 職員マスタ登録</strong>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="new-staff-name" placeholder="職員名を入力"
                        style="flex:1; padding:8px; border:1px solid #ccc; border-radius:5px; font-size:14px;">
                    <button onclick="addStaff()" style="padding:8px 12px;">追加</button>
                </div>
                <div id="staff-list" style="margin-top:10px;"></div>
            </div>
        </div>

        <!-- 服薬ログ -->
        <div class="log-box">
            <strong>📋 服薬確認ログ</strong>
            <div class="log-filter">
                <select id="log-date-filter" onchange="renderLog()">
                    <option value="all">すべての日付</option>
                    <option value="today">今日のみ</option>
                    <option value="week">今週</option>
                </select>
                <select id="log-staff-filter" onchange="renderLog()">
                    <option value="all">すべての職員</option>
                </select>
                <select id="log-type-filter" onchange="renderLog()">
                    <option value="all">すべての種別</option>
                    <option value="done">服薬完了のみ</option>
                    <option value="absent">休みのみ</option>
                </select>
            </div>
            <div class="btn-group-sm" style="margin-bottom:10px;">
                <button onclick="downloadLogCSV()" style="background:#2e7d32;">📥 CSVダウンロード</button>
                <button onclick="clearLog()" style="background:#b71c1c;">🗑 ログ削除</button>
            </div>
            <div id="log-list">（まだ記録がありません）</div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const STORAGE_KEY = "daycare_users_v2";
        const RESET_TIME_KEY = "auto_reset_time_key";
        const BACKUP_DATE_KEY = "last_backup_date";
        const STAFF_KEY = "daycare_staff_v1";
        const LOG_KEY = "daycare_med_log_v1";

        let users = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let staffList = JSON.parse(localStorage.getItem(STAFF_KEY)) || [];
        let medLogs = JSON.parse(localStorage.getItem(LOG_KEY)) || [];
        let autoResetTime = localStorage.getItem(RESET_TIME_KEY) || "05:00";
        let isAudioEnabled = false;
        let alarmTimer = null;
        let alarmStopped = false;
        let lastAlarmMinute = null;
        let pendingMedUserId = null;
        let pendingActionType = 'confirm';
        let currentSelectedDay = ["日", "月", "火", "水", "木", "金", "土"][new Date().getDay()];

        // スヌーズ用
        let snoozeTimer = null;
        let snoozeCountdownTimer = null;

        document.getElementById("reset-time-input").value = autoResetTime;

        if (users.length === 0) {
            users = [
                { id: "1", name: "佐藤 一郎", time: "09:00", medicine: "朝食後のお薬", weekdays: ["日", "月", "火", "水", "木", "金", "土"], status: "未" },
                { id: "2", name: "鈴木 花子", time: "10:30", medicine: "血圧のお薬", weekdays: ["月", "水", "金"], status: "未" },
                { id: "3", name: "山田 太郎", time: "13:30", medicine: "血圧のお薬", weekdays: ["月", "火", "水", "木", "金"], status: "未" },
            ];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
        }

        // ===== アラーム音 =====
        let alarmAudio = new Audio(document.getElementById("alarm-sound-select").value);
        alarmAudio.loop = true;

        function changeAlarmSound() {
            const wasPlaying = !alarmAudio.paused;
            alarmAudio.pause();
            alarmAudio = new Audio(document.getElementById("alarm-sound-select").value);
            alarmAudio.loop = true;
            if (wasPlaying) alarmAudio.play();
        }

        function testAlarmVolume() {
            const test = new Audio(document.getElementById("alarm-sound-select").value);
            test.play();
            setTimeout(() => { test.pause(); test.currentTime = 0; }, 3000);
        }

        function enableAudio() {
            isAudioEnabled = true;
            const msg = new SpeechSynthesisUtterance("音声機能が有効になりました。この音量は聞こえますか？");
            window.speechSynthesis.speak(msg);
            const btn = document.getElementById("start-btn");
            btn.classList.remove("blink-btn");
            btn.innerText = "📢 音声有効化済み";
            btn.style.backgroundColor = "#aaa";
        }

        // ===== 時計・アラーム判定 =====
        function updateClock() {
            const now = new Date();
            const hh = now.getHours().toString().padStart(2, '0');
            const mm = now.getMinutes().toString().padStart(2, '0');
            const ss = now.getSeconds().toString().padStart(2, '0');
            const dateStr = now.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
            document.getElementById('clock').innerHTML =
                dateStr + `<br><span style="font-size:1.5em;color:#008080;">${hh}:${mm}:${ss}</span>`;
            checkAlarm(`${hh}:${mm}`);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ===== 緊急度判定 =====
        function getUrgency(timeStr) {
            const now = new Date();
            const [h, m] = timeStr.split(':').map(Number);
            const target = new Date(now); target.setHours(h, m, 0, 0);
            const diff = (target - now) / 60000;
            if (diff < 0 && diff >= -60) return 'overdue';
            if (diff >= 0 && diff < 10) return 'urgent';
            if (diff >= 10 && diff < 30) return 'warning';
            return 'normal';
        }

        function getUrgencyBadge(timeStr, status) {
            if (status === '完了') return '';
            if (status === '休み') return '<span class="time-badge badge-absent">🏠 本日休み</span>';
            const u = getUrgency(timeStr);
            if (u === 'overdue') return '<span class="time-badge badge-overdue">⚠️ 時刻超過</span>';
            if (u === 'urgent') return '<span class="time-badge badge-urgent">🔴 まもなく</span>';
            if (u === 'warning') return '<span class="time-badge badge-warn">🟡 30分前</span>';
            return '';
        }

        // ===== リスト描画 =====
        function renderList() {
            const today = ["日", "月", "火", "水", "木", "金", "土"][new Date().getDay()];
            const keyword = document.getElementById("search-input").value;
            const sortMode = document.getElementById("sort-select").value;

            let filtered = users.filter(u =>
                (currentSelectedDay === '全' || u.weekdays.includes(currentSelectedDay)) &&
                u.name.includes(keyword)
            );

            filtered = [...filtered].sort((a, b) => {
                if (sortMode === 'time') {
                    return a.time.localeCompare(b.time);
                } else if (sortMode === 'status') {
                    const order = s => s === '未' ? 0 : s === '休み' ? 1 : 2;
                    if (order(a.status) !== order(b.status)) return order(a.status) - order(b.status);
                    return a.time.localeCompare(b.time);
                } else {
                    return a.name.localeCompare(b.name, 'ja');
                }
            });

            const listContainer = document.getElementById("user-list");
            listContainer.innerHTML = "";

            filtered.forEach(user => {
                const isAbsent = user.status === '休み';
                const isDone = user.status === '完了';
                const urgency = (!isDone && !isAbsent) ? getUrgency(user.time) : 'done';

                const cardClass = isAbsent ? 'status-absent'
                    : isDone ? 'status-done'
                        : urgency === 'overdue' ? 'status-overdue'
                            : urgency === 'urgent' ? 'status-urgent'
                                : urgency === 'warning' ? 'status-warning'
                                    : 'status-waiting';

                const badge = getUrgencyBadge(user.time, user.status);
                const dayDisplay = `（${user.weekdays.join('')}）`;

                const card = document.createElement("div");
                card.className = `user-card ${cardClass}`;
                card.dataset.id = user.id;

                if (isDone || isAbsent) {
                    const nameStyle = isAbsent ? 'color:#7986cb;' : 'color:#aaa;';
                    const infoStyle = isAbsent ? 'color:#9fa8da;' : 'color:#bbb;';
                    const doneLabel = isAbsent ? '🏠 休み' : '✓ 完了';
                    const doneStyle = isAbsent ? 'background:#7986cb;' : 'background:#bbb;';
                    card.innerHTML = `
                    <div style="display:flex;align-items:center;">
                        <input type="checkbox" class="delete-check" value="${user.id}" style="margin-right:10px;transform:scale(1.4);">
                        <div>
                            <span class="user-name" style="${nameStyle}">${user.name}</span>${badge} <small style="${infoStyle}">${dayDisplay}</small><br>
                            <span style="${infoStyle}">⏰ ${user.time} | 💊 ${user.medicine}</span>
                        </div>
                    </div>
                    <div style="display:flex;gap:5px;">
                        <button onclick="editUser('${user.id}', this)" class="btn-action">編集</button>
                        <button onclick="undoStatus('${user.id}')" class="btn-undo">↩ 取消</button>
                        <button class="btn-confirm" style="${doneStyle}">${doneLabel}</button>
                    </div>`;
                } else {
                    card.innerHTML = `
                    <div style="display:flex;align-items:center;">
                        <input type="checkbox" class="delete-check" value="${user.id}" style="margin-right:10px;transform:scale(1.4);">
                        <div>
                            <span class="user-name">${user.name}</span>${badge} <small>${dayDisplay}</small><br>
                            ⏰ ${user.time} | 💊 ${user.medicine}
                        </div>
                    </div>
                    <div style="display:flex;gap:5px;">
                        <button onclick="editUser('${user.id}', this)" class="btn-action">編集</button>
                        <button onclick="markAbsent('${user.id}')" class="btn-absent">🏠 休み</button>
                        <button onclick="toggleMedication('${user.id}')" class="btn-confirm">確認</button>
                    </div>`;
                }
                listContainer.appendChild(card);
            });

            // サマリー更新
            const todayUsers = users.filter(u => u.weekdays.includes(today));
            const doneCount = todayUsers.filter(u => u.status === '完了').length;
            const absentCount = todayUsers.filter(u => u.status === '休み').length;
            const pendCount = todayUsers.length - doneCount - absentCount;

            document.getElementById("sum-total").textContent = todayUsers.length;
            document.getElementById("sum-done").textContent = doneCount;
            document.getElementById("sum-pending").textContent = pendCount;
            document.getElementById("sum-absent").textContent = absentCount;

            const active = todayUsers.length - absentCount;
            const rate = active > 0 ? Math.round(doneCount / active * 100) : 100;
            document.getElementById("info-bar").innerHTML = pendCount > 0
                ? `⚠️ 未服薬：${pendCount}名`
                : `✅ 全員完了（服薬率 ${rate}%）`;
        }

        // ===== 服薬確認（職員モーダル） =====
        function toggleMedication(id) {
            pendingMedUserId = id;
            pendingActionType = 'confirm';
            const u = users.find(u => u.id === id);
            openStaffModal(u, 'confirm');
        }

        function markAbsent(id) {
            pendingMedUserId = id;
            pendingActionType = 'absent';
            const u = users.find(u => u.id === id);
            openStaffModal(u, 'absent');
        }

        function undoStatus(id) {
            const u = users.find(u => u.id === id);
            const label = u.status === '休み' ? '休み登録' : '服薬完了';
            if (!confirm(`「${u.name}」さんの${label}を取り消しますか？`)) return;
            u.status = '未';
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
            renderList();
            showToast("↩ 取り消しました");
        }

        function openStaffModal(u, mode) {
            const isAbsent = mode === 'absent';
            const inner = document.getElementById("staff-modal-inner");
            const title = document.getElementById("staff-modal-title");
            inner.className = isAbsent ? 'staff-modal-content absent-mode' : 'staff-modal-content';
            title.textContent = isAbsent ? '🏠 休みを登録する職員を選んでください' : '👤 確認した職員を選んでください';
            document.getElementById("staff-modal-target").innerHTML =
                `<strong>${u.name}</strong> さん<br>⏰ ${u.time}　💊 ${u.medicine}`;
            const list = document.getElementById("staff-btn-list");
            list.innerHTML = "";
            if (staffList.length === 0) {
                list.innerHTML = '<p style="color:#d32f2f;font-size:13px;">職員が登録されていません。<br>データ管理エリアから登録してください。</p>';
            } else {
                staffList.forEach(staff => {
                    const btn = document.createElement("button");
                    btn.textContent = staff;
                    btn.onclick = () => isAbsent ? confirmAbsent(staff) : confirmMedication(staff);
                    list.appendChild(btn);
                });
            }
            document.getElementById("staff-modal").classList.add("show");
        }

        function closeStaffModal() {
            pendingMedUserId = null;
            document.getElementById("staff-modal").classList.remove("show");
        }

        function confirmMedication(staffName) {
            const u = users.find(u => u.id === pendingMedUserId);
            if (!u) return closeStaffModal();
            u.status = '完了';
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
            _addLog({ userName: u.name, time: u.time, medicine: u.medicine, staff: staffName, type: 'done' });
            if (isAudioEnabled && window.speechSynthesis) {
                try { window.speechSynthesis.speak(new SpeechSynthesisUtterance(u.name + "さん、服薬しました")); } catch (e) { }
            }
            const today = ["日", "月", "火", "水", "木", "金", "土"][new Date().getDay()];
            const stillPending = users.some(x => x.time === u.time && x.status === '未' && x.weekdays.includes(today));
            closeStaffModal();
            renderList();
            if (!stillPending) {
                showToast(`🎉 ${u.time} の対象者、全員確認完了！`);
            } else {
                showToast(`✅ ${u.name} さん 服薬確認しました`);
            }
        }

        function confirmAbsent(staffName) {
            const u = users.find(u => u.id === pendingMedUserId);
            if (!u) return closeStaffModal();
            u.status = '休み';
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
            _addLog({ userName: u.name, time: u.time, medicine: u.medicine, staff: staffName, type: 'absent' });
            closeStaffModal();
            renderList();
            showToast(`🏠 ${u.name} さん 本日休みとして登録しました`);
        }

        // ===== ログ共通追記 =====
        function _addLog({ userName, time, medicine, staff, type }) {
            const now = new Date();
            const dateTimeStr = now.toLocaleDateString('ja-JP') + ' ' +
                now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            medLogs.unshift({ datetime: dateTimeStr, userName, time, medicine, staff, type: type || 'done' });
            if (medLogs.length > 1000) medLogs = medLogs.slice(0, 1000);
            localStorage.setItem(LOG_KEY, JSON.stringify(medLogs));
            renderLog();
        }

        // ===== アラーム =====
        function checkAlarm(nowTime) {
            if (nowTime === autoResetTime) autoResetStatus();
            if (!isAudioEnabled) return;

            if (nowTime !== lastAlarmMinute) {
                alarmStopped = false;
            }

            const today = ["日", "月", "火", "水", "木", "金", "土"][new Date().getDay()];
            const isTarget = users.some(u => u.time === nowTime && u.status === '未' && u.weekdays.includes(today));

            if (isTarget && !alarmStopped && !alarmTimer) {
                lastAlarmMinute = nowTime;
                const duration = parseInt(document.getElementById("alarm-duration").value) * 60000;
                alarmAudio = new Audio(document.getElementById("alarm-sound-select").value);
                alarmAudio.loop = true;
                alarmAudio.play().catch(() => { });
                document.getElementById("stop-alarm-btn").style.display = "block";
                alarmTimer = setTimeout(() => {
                    alarmAudio.pause();
                    document.getElementById("stop-alarm-btn").style.display = "none";
                    alarmTimer = null;
                }, duration);
            }
        }

        function stopAlarm() {
            // 完全停止：スヌーズも含めてすべてキャンセル
            alarmStopped = true;
            alarmAudio.pause();
            alarmAudio.currentTime = 0;
            document.getElementById("stop-alarm-btn").style.display = "none";
            document.getElementById("snooze-status").style.display = "none";
            clearTimeout(alarmTimer);
            clearTimeout(snoozeTimer);
            clearInterval(snoozeCountdownTimer);
            alarmTimer = null;
            snoozeTimer = null;
        }

        function snoozeAlarm() {
            // アラーム音を即座に止める
            alarmAudio.pause();
            alarmAudio.currentTime = 0;
            clearTimeout(alarmTimer);
            clearTimeout(snoozeTimer);
            clearInterval(snoozeCountdownTimer);
            alarmTimer = null;
            snoozeTimer = null;
            // alarmStopped は false のまま（スヌーズ後に再鳴動させるため）
            document.getElementById("stop-alarm-btn").style.display = "none";

            const minutes = parseInt(document.getElementById("snooze-duration").value);
            let remaining = minutes * 60;

            const statusEl = document.getElementById("snooze-status");
            statusEl.style.display = "block";

            // カウントダウン表示（1秒ごと）
            snoozeCountdownTimer = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(snoozeCountdownTimer);
                    statusEl.textContent = "⏰ スヌーズ終了 — アラームを再開します";
                } else {
                    const m = Math.floor(remaining / 60);
                    const s = remaining % 60;
                    statusEl.textContent = `💤 スヌーズ中... あと ${m}分${String(s).padStart(2, '0')}秒`;
                }
            }, 1000);

            // スヌーズ終了後に再鳴動
            snoozeTimer = setTimeout(() => {
                clearInterval(snoozeCountdownTimer);
                statusEl.style.display = "none";

                const today = ["日", "月", "火", "水", "木", "金", "土"][new Date().getDay()];
                const stillPending = users.some(u => u.status === '未' && u.weekdays.includes(today));

                if (stillPending && !alarmStopped) {
                    alarmAudio = new Audio(document.getElementById("alarm-sound-select").value);
                    alarmAudio.loop = true;
                    alarmAudio.play().catch(() => { });
                    document.getElementById("stop-alarm-btn").style.display = "block";
                    const duration = parseInt(document.getElementById("alarm-duration").value) * 60000;
                    alarmTimer = setTimeout(() => {
                        alarmAudio.pause();
                        document.getElementById("stop-alarm-btn").style.display = "none";
                        alarmTimer = null;
                    }, duration);
                    showToast("💤 スヌーズ終了 — アラームを再開しました");
                }
                snoozeTimer = null;
            }, minutes * 60000);

            showToast(`💤 ${minutes}分後に再アラームします`);
        }

        // ===== 自動リセット =====
        function autoResetStatus() {
            const today = new Date().toISOString().slice(0, 10);
            downloadJSON(`kusuri_auto_${today}.json`);
            users.forEach(u => u.status = "未");
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
            renderList();
        }

        function resetStatus() {
            if (confirm("全員のステータスをリセットしますか？（休み含む）")) {
                users.forEach(u => u.status = "未");
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                renderList();
            }
        }

        // ===== バックアップ =====
        function downloadJSON(filename) {
            const blob = new Blob([JSON.stringify(users, null, 2)], { type: "application/json" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            const now = new Date();
            const dt = now.toLocaleDateString('ja-JP') + ' ' + now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            localStorage.setItem(BACKUP_DATE_KEY, dt);
            updateBackupBar();
        }

        function manualBackup() {
            const today = new Date().toISOString().slice(0, 10);
            downloadJSON(`kusuri_backup_${today}.json`);
            showToast("💾 バックアップを保存しました！");
        }

        function updateBackupBar() {
            const bar = document.getElementById("backup-bar");
            const status = document.getElementById("backup-status");
            const last = localStorage.getItem(BACKUP_DATE_KEY);
            const today = new Date().toLocaleDateString('ja-JP');
            const isToday = last && last.startsWith(today);
            bar.classList.toggle("warn", !isToday);
            status.textContent = isToday
                ? `✅ 本日バックアップ済み（${last}）`
                : last ? `⚠️ 最終バックアップ：${last}（今日まだ未保存）` : "⚠️ バックアップがありません！";
        }

        // ===== 職員マスタ =====
        function renderStaffList() {
            const el = document.getElementById("staff-list");
            if (!el) return;
            el.innerHTML = staffList.length === 0
                ? '<p style="color:#888;font-size:12px;margin:4px 0;">職員未登録</p>'
                : staffList.map((s, i) =>
                    `<span style="display:inline-flex;align-items:center;background:#fff;border:1px solid #ccc;border-radius:20px;padding:3px 10px;margin:3px;font-size:13px;">
                        ${s}
                        <button onclick="removeStaff(${i})" style="background:none;color:#d32f2f;border:none;padding:0 0 0 5px;font-size:13px;cursor:pointer;min-width:auto;">✕</button>
                    </span>`
                ).join('');

            const sel = document.getElementById("log-staff-filter");
            const cur = sel.value;
            sel.innerHTML = '<option value="all">すべての職員</option>' +
                staffList.map(s => `<option value="${s}" ${s === cur ? 'selected' : ''}>${s}</option>`).join('');
        }

        function addStaff() {
            const name = document.getElementById("new-staff-name").value.trim();
            if (!name) return alert("職員名を入力してください");
            if (staffList.includes(name)) return alert("すでに登録されています");
            staffList.push(name);
            localStorage.setItem(STAFF_KEY, JSON.stringify(staffList));
            document.getElementById("new-staff-name").value = "";
            renderStaffList();
            showToast(`${name} を登録しました`);
        }

        function removeStaff(i) {
            if (!confirm(`「${staffList[i]}」を削除しますか？`)) return;
            staffList.splice(i, 1);
            localStorage.setItem(STAFF_KEY, JSON.stringify(staffList));
            renderStaffList();
        }

        // ===== ログ =====
        function renderLog() {
            const el = document.getElementById("log-list");
            if (!el) return;
            const dateFilter = document.getElementById("log-date-filter").value;
            const staffFilter = document.getElementById("log-staff-filter").value;
            const typeFilter = document.getElementById("log-type-filter").value;
            const today = new Date().toLocaleDateString('ja-JP');
            const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);

            let filtered = medLogs.filter(log => {
                if (staffFilter !== 'all' && log.staff !== staffFilter) return false;
                if (typeFilter === 'done' && log.type !== 'done') return false;
                if (typeFilter === 'absent' && log.type !== 'absent') return false;
                if (dateFilter === 'today') return log.datetime.startsWith(today);
                if (dateFilter === 'week') {
                    const d = new Date(log.datetime.replace(/\//g, '-').replace(' ', ' '));
                    return d >= weekAgo;
                }
                return true;
            });

            if (filtered.length === 0) { el.innerHTML = "（該当する記録がありません）"; return; }

            el.innerHTML = filtered.slice(0, 100).map(log => {
                const isAbsent = log.type === 'absent';
                const icon = isAbsent ? '🏠' : '✅';
                const label = isAbsent ? '休み登録' : '服薬確認';
                const cls = isAbsent ? 'log-entry log-absent' : 'log-entry';
                return `<div class="${cls}">
                    📅 ${log.datetime}　👤 <strong>${log.userName}</strong><br>
                    ⏰ ${log.time}　💊 ${log.medicine}　${icon} ${label}：${log.staff}
                </div>`;
            }).join('');
        }

        function downloadLogCSV() {
            if (medLogs.length === 0) return alert("ログがありません");
            let csv = "日時,利用者名,服薬時刻,お薬,確認職員,種別\n";
            medLogs.forEach(l => {
                const typeLabel = l.type === 'absent' ? '休み' : '服薬確認';
                csv += [l.datetime, l.userName, l.time, l.medicine, l.staff, typeLabel].join(",") + "\n";
            });
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `fukuyaku_log_${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
        }

        function clearLog() {
            if (!confirm("服薬ログをすべて削除しますか？")) return;
            medLogs = []; localStorage.setItem(LOG_KEY, JSON.stringify(medLogs)); renderLog();
        }

        // ===== タブ・フォーム =====
        function switchDay(day) {
            currentSelectedDay = day;
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.id === `tab-${day}`));
            renderList();
        }

        function editUser(id, btnElement) {
            document.querySelectorAll('.user-card').forEach(c => c.classList.remove('editing'));
            btnElement.closest('.user-card').classList.add('editing');
            document.querySelector('.form-box').scrollIntoView({ behavior: 'smooth' });
            const u = users.find(x => x.id === id);
            document.getElementById("edit-id").value = u.id;
            document.getElementById("new-name").value = u.name;
            document.getElementById("new-time").value = u.time;
            document.getElementById("new-medicine").value = u.medicine;
            document.querySelectorAll('input[name="weekdays"]').forEach(cb => cb.checked = u.weekdays.includes(cb.value));
            document.getElementById("form-title").innerHTML = `✏️ 編集中: <span style="color:#d32f2f">${u.name}</span>`;
            document.getElementById("submit-btn").innerText = "内容を更新する";
            document.getElementById("cancel-btn").style.display = "block";
        }

        function resetForm() {
            document.querySelectorAll('.user-card').forEach(c => c.classList.remove('editing'));
            ["edit-id", "new-name", "new-medicine", "new-time"].forEach(id => document.getElementById(id).value = "");
            document.querySelectorAll('input[name="weekdays"]').forEach(cb => cb.checked = false);
            document.getElementById("form-title").innerText = "👤 利用者の新規登録";
            document.getElementById("submit-btn").innerText = "登録";
            document.getElementById("cancel-btn").style.display = "none";
        }

        function saveUser() {
            const id = document.getElementById("edit-id").value;
            const userData = {
                name: document.getElementById("new-name").value,
                time: document.getElementById("new-time").value,
                medicine: document.getElementById("new-medicine").value,
                weekdays: Array.from(document.querySelectorAll('input[name="weekdays"]:checked')).map(b => b.value)
            };
            if (!userData.name) return alert("名前を入力してください");
            if (id) { Object.assign(users.find(x => x.id === id), userData); showToast("更新しました！"); }
            else { users.push({ ...userData, id: String(Date.now()), status: "未" }); showToast("登録しました！"); }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
            resetForm(); renderList();
        }

        function deleteSelected() {
            const checked = Array.from(document.querySelectorAll('.delete-check:checked')).map(cb => cb.value);
            if (checked.length === 0) return alert("削除する利用者を選択してください");
            if (confirm(checked.length + "名を削除しますか？")) {
                users = users.filter(u => !checked.includes(u.id));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                renderList();
            }
        }

        // ===== データ管理 =====
        function saveResetTime() {
            autoResetTime = document.getElementById("reset-time-input").value;
            localStorage.setItem(RESET_TIME_KEY, autoResetTime);
        }

        function exportJSON() { document.getElementById("csv-text").value = JSON.stringify(users); }

        function importJSON(isOverwrite) {
            try {
                const d = JSON.parse(document.getElementById("csv-text").value);
                users = isOverwrite ? d : users.concat(d);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                renderList(); alert("JSONデータを読み込みました");
            } catch { alert("JSONデータ形式エラーです"); }
        }

        function importFromPaste() {
            const text = document.getElementById("csv-text").value;
            if (!text) return alert("テキストエリアにデータを貼り付けてください");
            const newUsers = [];
            text.split('\n').forEach((row, i) => {
                if (!row.trim()) return;
                const cols = row.split('\t');
                if (cols.length >= 4) newUsers.push({ id: String(Date.now() + i), name: cols[0], time: cols[1], weekdays: cols[2].split(''), medicine: cols[3], status: "未" });
            });
            if (newUsers.length > 0) {
                users = users.concat(newUsers);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                renderList(); document.getElementById("csv-text").value = "";
                alert(newUsers.length + "名を読み込みました！");
            } else { alert("読み込めませんでした。タブ区切りで貼り付けてください。"); }
        }

        function downloadCSV() {
            let csv = "名前,時刻,曜日,薬\n";
            users.forEach(u => { csv += [u.name, u.time, u.weekdays.join(""), u.medicine].join(",") + "\n"; });
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "yakuzai_list.csv"; link.click();
        }

        function triggerCSVImport(isOverwrite) {
            document.getElementById('import-mode').value = isOverwrite ? 'overwrite' : 'append';
            document.getElementById('csv-file-input').click();
        }

        function handleCSVFile(event) {
            const file = event.target.files[0];
            const isOverwrite = document.getElementById('import-mode').value === 'overwrite';
            const reader = new FileReader();
            reader.onload = e => {
                const rows = e.target.result.split('\n');
                const newUsers = [];
                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i].trim()) continue;
                    const cols = rows[i].split(',');
                    if (cols.length < 4) continue;
                    newUsers.push({ id: String(Date.now() + i), name: cols[0], time: cols[1], weekdays: cols[2].split(''), medicine: cols[3], status: "未" });
                }
                users = isOverwrite ? newUsers : users.concat(newUsers);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                renderList(); alert("CSVデータを読み込みました");
            };
            reader.readAsText(file);
        }

        function initializeAll() {
            if (confirm("全データを削除しますか？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); }
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg; t.className = "show";
            setTimeout(() => { t.className = ""; }, 3000);
        }

        // ===== 起動処理 =====
        document.getElementById("close-modal-btn").addEventListener("click", () =>
            document.getElementById("modal-overlay").style.display = "none"
        );

        window.onload = () => {
            renderList();
            switchDay(currentSelectedDay);
            updateBackupBar();
            renderStaffList();
            renderLog();
        };
    </script>
</body>

</html>
